<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>site de informação esportivas</title>
    <style>
        header{
            background-color: #0F9EE5;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            border: 7px solid #800000;
            padding: 16px;
        }
            main{
            max-width: 800px;
            margin: 0 auto;
            background-color: #0F9EE5;
            color:#000000;
            display: flex; 
            }
        img{
            width: 500px;
            height: 500px;
        }
        .artigo-autor{
        font-weight: bold;
        }
           
        
    </style>
</head>
<body>
    <header>
    <h1>site de informação esportiva Paraná</h1>
   <h2>ultimas noticias esportivas da região norte pioneira do Paraná </h2>
    </header>
    <main>
        <img src="esportes.jpeg" alt="">
        <div>
        <h2>jogos escolares</h2>
        <p>ocorreu a fase regional entre os dias 15 e 20 de maio de 2026, diversas modalidades de esportes</p>
        <button>👍​⚠️​<span>0</span>​</button>
        </div>
    </main>
</body>
<script>
    const botao = document.querySelector("button");//variavel para acessar botão
    botao.addEventListener ("click", botaoClicado);//quando houver um click vai ser contabilizado 
    function botaoClicado() {// cria um conjunto de instruções que será executado quando o clique acontecer.
        console.log("fui clicado");// serve para verificação 
        let texto = botao.querySelector("span");// serve para mostrar os numeros aumentando dos clicks 
        texto.textContent++;
    }
</script>
</html>
